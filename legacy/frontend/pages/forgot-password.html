<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password – Back2Me</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">🔑</div>
    Reset Password
  </div>
  <p class="auth-tagline">Enter your email and we'll send a reset link</p>

  <div id="formWrap">
    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@campus.edu" required>
        <span class="form-error" id="emailErr"></span>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg" id="submitBtn">
        Send Reset Link
      </button>
    </form>
  </div>

  <div id="successMsg" class="hidden" style="text-align:center;padding:20px 0;">
    <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
    <p style="color:var(--success);font-weight:600;margin-bottom:8px;">Reset link sent!</p>
    <p class="text-muted text-sm">Check your inbox and follow the instructions.</p>
  </div>

  <p class="auth-footer mt-16">
    <a href="login.html" class="auth-link">← Back to sign in</a>
  </p>
</div>

<script src="../js/app.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email  = document.getElementById('email').value.trim();
  const submit = document.getElementById('submitBtn');
  const errEl  = document.getElementById('emailErr');

  errEl.textContent = ''; errEl.classList.remove('show');

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Enter a valid email'; errEl.classList.add('show'); errEl.style.display='block'; return;
  }

  submit.disabled = true; submit.textContent = 'Sending…';

  try {
    await Auth.forgotPassword(email);
    document.getElementById('formWrap').classList.add('hidden');
    document.getElementById('successMsg').classList.remove('hidden');
  } catch (err) {
    errEl.textContent = err.message; errEl.classList.add('show'); errEl.style.display='block';
    submit.disabled = false; submit.textContent = 'Send Reset Link';
  }
});
</script>
</body>
</html>
