<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login – Back2Me</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">📍</div>
      Back<span class="logo-2">2</span>Me
    </div>
    <p class="auth-tagline">Campus Lost & Found — sign in to continue</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@campus.edu" required>
        <span class="form-error" id="emailErr"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        <span class="form-error" id="passwordErr"></span>
      </div>

      <div class="flex justify-between items-center mb-16" style="font-size:.85rem;">
        <label style="display:flex;align-items:center;gap:7px;color:var(--text-secondary);cursor:pointer;">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg" id="submitBtn">
        Sign In
      </button>

      <span class="form-error" id="globalErr" style="display:block;text-align:center;margin-top:10px;"></span>
    </form>

    <p class="auth-footer">
      No account? <a href="register.html" class="auth-link">Create one</a>
    </p>
  </div>

  <script src="../js/app.js"></script>
  <script>
    (async () => {
      const form = document.getElementById('loginForm');
      const submit = document.getElementById('submitBtn');

      // Attach listener immediately to prevent default submission if user clicks early
      form.addEventListener('submit', async e => {
        e.preventDefault();
        clearErrors();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!email || !password) { showErr('globalErr', 'All fields required'); return; }

        submit.disabled = true;
        submit.textContent = 'Signing in…';
        try {
          console.log('[Login] Attempting sign-in for:', email);
          const res = await Auth.login(email, password);
          console.log('[Login] Success:', res);

          toast('Login successful! Redirecting...', 'success');

          // Small delay to let cookie settle and user see the toast
          setTimeout(() => {
            console.log('[Login] Redirecting to home...');
            window.location.href = '/pages/home.html';
          }, 800);
        } catch (err) {
          console.error('[Login] Error:', err.message);
          showErr('globalErr', err.message);
          submit.disabled = false;
          submit.textContent = 'Sign In';
        }
      });

      // check if already logged in
      try {
        const user = await Auth.me();
        if (user) {
          console.log('[Login] Already authenticated as:', user.username);
          window.location.href = '/pages/home.html';
          return;
        }
      } catch (e) {
        console.log('[Login] No active session');
      }

      function showErr(id, msg) {
        const el = document.getElementById(id);
        if (el) { el.textContent = msg; el.classList.add('show'); el.style.display = 'block'; }
      }
      function clearErrors() {
        document.querySelectorAll('.form-error').forEach(el => {
          el.textContent = ''; el.classList.remove('show'); el.style.display = '';
        });
      }
    })();
  </script>
</body>

</html>
